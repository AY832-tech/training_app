# Render 用の設定（Blueprint）。GitHub リポジトリを Render に接続すると自動で読まれます。
# シークレット（APP_PASSWORD / Turso の URL・トークン）は Render のダッシュボードで入力します。
services:
  - type: web
    name: muscle-training-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "22.11.0"
      - key: TZ
        value: Asia/Tokyo
      - key: APP_PASSWORD
        sync: false          # ダッシュボードで設定（アプリのログインパスワード）
      - key: TURSO_DATABASE_URL
        sync: false          # 例: libsql://xxxx.turso.io
      - key: TURSO_AUTH_TOKEN
        sync: false          # Turso のトークン
